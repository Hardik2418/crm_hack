name: Node CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Start App
        run: node app.js &
      
      - name: Wait
        run: sleep 10

      - name: Test Server
        run: curl http://localhost:3000

      - name: Build Docker
        run: docker build -t crm-app .
